<div class="modal fade" id="editPlateModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit Plate Number</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="editPlateVehiclePlatformId">

        <div class="mb-3">
          <label class="form-label">Current Plate</label>
          <input type="text" id="currentPlateNumber" class="form-control" readonly>
        </div>

        <div class="mb-3">
          <label class="form-label">New Plate Number</label>
          <input type="text" id="newPlateNumber" class="form-control" maxlength="20">
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="savePlateBtn">Save</button>
      </div>
    </div>
  </div>
</div>
